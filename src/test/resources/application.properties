# H2 Test Database Configuration
# This ensures all tests use an in-memory H2 database, completely independent from Render

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Serialize dates as ISO 8601 strings instead of arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT config for tests
app.jwt.secret=test-secret-key-at-least-32-characters-long!!
app.jwt.expiration-ms=86400000

# CORS origin for test context
app.cors.allowed-origins=http://localhost:5173
