spring.application.name=webtech

# Connect to the Render database URL
spring.datasource.url=${JDBC_DATABASE_URL}

# We don't need user/pass if using the URL

# Tell Hibernate what kind of SQL to generate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# This will automatically update your database tables to match your @Entity
spring.jpa.hibernate.ddl-auto=update

# Good practice: show the SQL queries in the console for debugging
spring.jpa.show-sql=true

# Serialize dates as ISO 8601 strings instead of arrays
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=${PORT:8080}

# JWT Configuration
# JWT_SECRET MUST be provided as an env var (min 32 characters for HS256).
# Expiration default: 7 days = 604800000 ms (override via JWT_EXPIRATION_MS).
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
