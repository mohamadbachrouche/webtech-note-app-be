spring.application.name=webtech

# Connect to the Render database URL
spring.datasource.url=${JDBC_DATABASE_URL}

# We don't need user/pass if using the URL

# Tell Hibernate what kind of SQL to generate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Safe default: fail fast if the schema doesn't match the entities.
# The `local` profile overrides this to `update` for in-memory H2 dev runs.
# A follow-up should introduce Flyway/Liquibase for managed schema migrations.
spring.jpa.hibernate.ddl-auto=validate

# SQL logging is off by default; enable it in the `local` profile only.
spring.jpa.show-sql=false

# Serialize dates as ISO 8601 strings instead of arrays
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=${PORT:8080}

# JWT Configuration
# Set JWT_SECRET as an environment variable in every environment (min 32 characters)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
