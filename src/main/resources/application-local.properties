# H2 Database Configuration for local development
spring.datasource.url=jdbc:h2:mem:notedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# JWT config for local development
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Local frontend dev servers (Vite defaults)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5177